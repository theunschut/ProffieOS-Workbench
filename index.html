<body>
    <div id="app">
        <!-- Loading indicator while Blazor WASM initialises -->
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;flex-direction:column;gap:1.5rem;">
            <div style="font-family:sans-serif;color:#00b8e8;font-size:1.1rem;letter-spacing:.1em;">LOADING...</div>
            <svg width="60" height="60" viewBox="0 0 60 60">
                <circle cx="30" cy="30" r="22" fill="none" stroke="#00b8e8" stroke-width="3"
                        stroke-dasharray="100" stroke-dashoffset="0"
                        style="animation:spin 1.2s linear infinite;transform-origin:50% 50%;" />
            </svg>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            const baseHref = document.querySelector('base')?.getAttribute('href') ?? '/';
            const basePath = baseHref.endsWith('/') ? baseHref : `${baseHref}/`;
            const swPath = `${basePath}service-worker.js`;

            // Service worker is opt-in to avoid stale-cache issues during hardware stability testing.
            // Enable by setting localStorage key "pwa-sw-enabled" to "true".
            const swEnabled = localStorage.getItem('pwa-sw-enabled') === 'true';

            if (swEnabled) {
                navigator.serviceWorker.register(swPath, { updateViaCache: 'none' });
            } else {
                navigator.serviceWorker.getRegistration(swPath).then(reg => {
                    if (reg) reg.unregister();
                });
            }
        }
    </script>
